version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kailash_postgres
    environment:
      POSTGRES_USER: kailash
      POSTGRES_PASSWORD: kailash_password_123
      POSTGRES_DB: kailash_mansarovar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kailash_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kailash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: kailash_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kailash_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Application
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kailash_api
    environment:
      DATABASE_URL: postgresql://kailash:kailash_password_123@postgres:5432/kailash_mansarovar
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    networks:
      - kailash_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  kailash_network:
    driver: bridge
